<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="bg-warning shadow-sm mb-4">
      <h1
        id="header"
        class="p-4 text-white d-flex justify-content-center fw-bold"
      >
        Galeria de los Simpsons
      </h1>
    </header>
    <main class="container">
      <section class="row mb-5 justify-content-center">
        <div class="col-md-6">
          <form id="formBuscar" class="d-flex gap-2">
            <input
              type="text"
              id="inputBuscar"
              class="form-control border-warning"
              placeholder="Buscar personaje por nombre"
            />
            <button type="submit" class="btn btn-warning px-4">Buscar</button>
          </form>
          <div id="mensajeError" class="mt-2 text-danger fw-bold"></div>
        </div>
      </section>

      <div class="row g-4 mt-2" id="cardContainer"></div>
    </main>
      <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-warning shadow-lg">
        <div id="modalContent">
        </div>
      </div>
    </div>
  </div>

    <footer class="mt-5 p-3">
      <h3 class="p-2 text-white fs-5 text-center fw-bold">
        &copy; 2026 Todos los derechos reservados
      </h3>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
